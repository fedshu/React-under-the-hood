<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo</title>
</head>

<body>
  <div id="root"></div>
  <script>

  const api = {
    get (url) {
      switch(url) {
        case '/lots':
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve(  
              [
                {
                  id: 1,
                  name: 'Apple',
                  description: 'Apple decription',
                  price: '16'
                },
                {
                  id: 2,
                  name: 'Orange',
                  description: 'Orange decription',
                  price: '41'
                }
              ])
          }, 3000)
        })
        default: 
          throw new Error('Unknown adress')
      }
    }
  }

  const stream = {
    subscribe(channel, listener) {
      const match = /price-(\d+)/.exec(channel)
        if (match) {
          setInterval(() => {
            listener({
              id: parseInt(match[1]),
              price: Math.round((Math.random() * 10 + 30))
            })
          }, 400)
        }
    }
  }
  
    // ###################################

    let state = {
      time: new Date(),
      lots: null
    }
    // ###################################

    function App({ state }) {
      const node = document.createElement('div')
      node.className = 'app'

      node.append(Header())
      node.append(Clock({ time: state.time }))
      node.append(Lots({ lots: state.lots }))

      return node
    }

    function Header() {
      const node = document.createElement('header')
      node.className = 'header'
      node.append(Logo());
      return node
    }

    function Logo() {
      const node = document.createElement('img')
      node.className = 'logo'
      // node.src = 'logo.png'
      return node
    }

    function Clock({ time }) {
      const node = document.createElement('div')
      node.className = 'clock'

      const value = document.createElement('span')
      value.className = 'value'
      value.innerText = time.toLocaleTimeString()

      node.append(value)

      const icon = document.createElement('span')

      if (time.getHours() >= 7 && time.getHours() <= 21) {
        icon.className = 'icon day'
        icon.style.backgroundColor = 'yellow'
        icon.style.padding = '7px'
      } else {
        icon.className = 'icon night'
        icon.style.backgroundColor = 'black'
        icon.style.padding = '7px'
      }

      node.append(icon)

      return node
    }

    function loading() {
      const node = document.createElement('div')
      node.className = 'Loading...'
      node.innerHTML = 'Loading...'
      return node
    }

    function Lots({ lots }) {
      if (lots === null) {
        return loading()
      }

      const node = document.createElement('div')
      node.className = 'lots'

      lots.forEach((lot) => {
        node.append(Lot({ lot }))
      })

      return node
    }

    function Lot({ lot }) {
      const node = document.createElement('article')
      node.className = 'lot'

      const price = document.createElement('div')
      price.className = 'price'
      price.innerText = lot.price
      node.append(price)

      const name = document.createElement('h1')
      name.innerText = lot.name
      node.append(name)

      const description = document.createElement('p')
      description.innerText = lot.description
      node.append(description)

      return node
    }

    // ###################################
    function renderView(state) {
      render(
        App({ state }),
        document.getElementById('root')
      )
    }
    // ###################################

    api.get('/lots').then((lots) => {
      state = {
        ...state,
        lots
      }

      renderView(state)

      const onPrice = (data) => {
        state = {
          ...state,
          lots: state.lots.map( lot => {
            if (lot.id === data.id) {
              return {
                ...lot,
                price: data.price
              }
            }
            return lot
          })
        }
      }

      lots.forEach((lot) => {
        stream.subscribe(`price-${lot.id}`, onPrice)
      })
    })


    setInterval(() => {
       state = {
        ...state,
        time: new Date()
      }

      renderView(state)

      // Замена определенного элемента
        // const time = new Date()
        // const app = document.getElementById('root').querySelector('.app')
        // const clock = app.querySelector('.clock')
        // const newClock = Clock({ time })
        // app.replaceChild(newClock, clock)
    }, 1000)

    // ###################################
    function render(virtualDom, realDomRoot) {
      const virtualDomRoot = document.createElement(realDomRoot.tagName)
      virtualDomRoot.id = realDomRoot.id
      virtualDomRoot.append(virtualDom)

      sync(virtualDomRoot, realDomRoot)
    }

    function sync(virtualNode, realNode) {
      // Sync element

      if (virtualNode.id !== realNode.id) {
        realNode.id = virtualNode.id
      }

      if (virtualNode.className !== realNode.className) {
        realNode.className = virtualNode.className
      }

      if (virtualNode.attributes) {
        Array.from(virtualNode.attributes).forEach((attr) => {
          realNode[attr.name] = attr.value
        })
      }

      if (virtualNode.nodeValue !== realNode.nodeValue) {
        realNode.nodeValue = virtualNode.nodeValue
      }

      // Sync child

      const virtualChildren = virtualNode.childNodes
      const realChildren = realNode.childNodes

      for (let i = 0; i < virtualChildren.length || i < realChildren.length; i++) {
        const virtual = virtualChildren[i]
        const real = realChildren[i]

        // Remove
        if (virtual === undefined && real !== undefined) {
          realNode.remove(real)
        }

        // Update
        if (virtual !== undefined && real !== undefined && virtual.tagName === real.tagName) {
          sync(virtual, real)
        }

        // Replace
        if (virtual !== undefined && real !== undefined && virtual.tagName !== real.tagName) {
          const newReal = createRealNodeByVirtual(virtual)
          sync(virtual, newReal)
          realNode.replaceChild(newReal, real)
        }

        // Add
        if (virtual !== undefined && real === undefined) {
          const newReal = createRealNodeByVirtual(virtual)
          sync(virtual, newReal)
          realNode.appendChild(newReal)
        }
      }
    }

    function createRealNodeByVirtual(virtual) {
      if (virtual.nodeType === Node.TEXT_NODE) {
        return document.createTextNode('')
      }
      return document.createElement(virtual.tagName)
    }

  </script>
</body>

</html>
